services:
  # Frontend (React + Vite) — connects to hosted Supabase for database & auth
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: awpb-frontend
    environment:
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
      VITE_APP_URL: ${VITE_APP_URL}
    ports:
      - "5173:5173"
    networks:
      - awpb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  awpb-network:
    driver: bridge
